services:
  garmin-fastapi-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garmin-fastapi-bridge
    restart: always
    environment:
      - DEBUG=False
      - GARMIN_USERNAME=${GARMIN_USERNAME:-joe@shmoe.com}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD:-yourpassword}
    ports:
      - 10821:8000
    volumes:
      - ./data:/opt/garmin/data
